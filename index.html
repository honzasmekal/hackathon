<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hackathon - Vercel Deploy Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff5858 0%, #b91c1c 100%);
      color: #fff;
    }
    main {
      text-align: center;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      max-width: 480px;
    }
    h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    p { font-size: 1.1rem; line-height: 1.6; opacity: 0.9; }
    .status {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.5rem 1rem;
      background: rgba(46, 204, 113, 0.3);
      border: 1px solid rgba(46, 204, 113, 0.6);
      border-radius: 999px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hackathon</h1>
    <p>Testovací stránka pro ověření automatického deploye na Vercel.</p>
    <span class="status">Deploy OK</span>
  </main>
</body>
</html>
